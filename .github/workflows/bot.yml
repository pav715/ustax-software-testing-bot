name: US Tax Software Testing Bot (Manual)

on:
  workflow_dispatch:
    inputs:
      seed_mode:
        description: "Seed mode - mark all current jobs as seen without sending"
        required: false
        default: "false"

concurrency:
  group: manual-bot-run
  cancel-in-progress: false
  queue: max

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run bot cycle
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SEED_MODE: ${{ github.event.inputs.seed_mode || 'false' }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          success=false
          for attempt in {1..3}; do
            echo "Attempt $attempt..."
            if python run_once.py; then success=true; break; fi
            if [ $attempt -lt 3 ]; then sleep 30; fi
          done
          [ "$success" = true ] || exit 1
      - name: Save state files back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/bot-state-backup
          cp -f bot_state.json seen_jobs.json stats.json /tmp/bot-state-backup/ 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          cp -f /tmp/bot-state-backup/bot_state.json bot_state.json 2>/dev/null || true
          cp -f /tmp/bot-state-backup/seen_jobs.json seen_jobs.json 2>/dev/null || true
          cp -f /tmp/bot-state-backup/stats.json stats.json 2>/dev/null || true
          git add bot_state.json seen_jobs.json stats.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update bot state [skip ci]"
          git push origin main
      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=❌ US Tax Software Testing Bot failed — check GitHub Actions logs" \
            -d "parse_mode=Markdown" || true
