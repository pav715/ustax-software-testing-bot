name: US Tax Software Testing Bot (Manual)

on:
  workflow_dispatch:
    inputs:
      seed_mode:
        description: "Seed mode - mark all current jobs as seen without sending (run ONCE to reset)"
        required: false
        default: "false"

concurrency:
  group: manual-bot-run
  cancel-in-progress: false
  queue: max

jobs:
  run:
    uses: ./.github/workflows/bot-run.yml
    secrets: inherit
    with:
      seed_mode: ${{ github.event.inputs.seed_mode || 'false' }}
