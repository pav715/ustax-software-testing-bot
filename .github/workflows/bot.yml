name: US Tax Software Testing Bot

on:
  schedule:
    # IST 8:00 AM - 11:30 PM exactly
    - cron: "30 2 * * *"
    - cron: "30 3 * * *"
    - cron: "30 4 * * *"
    - cron: "30 5 * * *"
    - cron: "30 6 * * *"
    - cron: "30 7 * * *"
    - cron: "30 8 * * *"
    - cron: "30 9 * * *"
    - cron: "30 10 * * *"
    - cron: "30 11 * * *"
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"
    - cron: "30 14 * * *"
    - cron: "30 15 * * *"
    - cron: "30 16 * * *"
    - cron: "30 17 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      seed_mode:
        description: "Seed mode - mark all current jobs as seen without sending (run ONCE to reset)"
        required: false
        default: "false"

concurrency:
  group: bot-run-${{ github.workflow }}
  cancel-in-progress: false
  queue: max

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot cycle
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SEED_MODE: ${{ github.event.inputs.seed_mode || 'false' }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          success=false
          for attempt in {1..3}; do
            echo "Attempt $attempt..."
            if python run_once.py; then success=true; break; fi
            if [ $attempt -lt 3 ]; then sleep 30; fi
          done
          [ "$success" = true ] || exit 1

      - name: Save state files back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true
          git add seen_jobs.json stats.json bot_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update bot state [skip ci]"
          git push || exit 1

      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=❌ US Tax Software Testing Bot failed — check GitHub Actions logs" \
            -d "parse_mode=Markdown" || true
