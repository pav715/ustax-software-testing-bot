name: Auto 11:00 PM IST

on:
  schedule:
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-bot-run
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Dedupe guard
        id: gate
        run: |
          if [ -f bot_state.json ]; then
            SHOULD=$(python3 - <<'PY'
          import json
          from datetime import datetime
          try:
              state = json.load(open("bot_state.json"))
              last = state.get("last_run_at", "")
              if not last:
                  print("true")
              else:
                  secs = (datetime.utcnow() - datetime.fromisoformat(last)).total_seconds()
                  print("false" if secs < 2700 else "true")
          except Exception:
              print("true")
          PY
          )
            if [ "$SHOULD" = "false" ]; then
              echo "Ran within 45 min — skip"
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
        if: steps.gate.outputs.run == 'true'

      - name: Run bot cycle
        if: steps.gate.outputs.run == 'true'
        env:
          BOT_TOKEN: ${ secrets.BOT_TOKEN }
          CHAT_ID: ${ secrets.CHAT_ID }
          SEED_MODE: "false"
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          success=false
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            if python run_once.py; then success=true; break; fi
            if [ $attempt -lt 3 ]; then sleep 30; fi
          done
          [ "$success" = true ] || exit 1

      - name: Save state files back to repo
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true
          git add seen_jobs.json stats.json bot_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update bot state [skip ci]"
          git push || exit 1

      - name: Notify Telegram on failure
        if: failure() && steps.gate.outputs.run == 'true'
        env:
          BOT_TOKEN: ${ secrets.BOT_TOKEN }
          CHAT_ID: ${ secrets.CHAT_ID }
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=❌ US Tax Software Testing Bot failed — check GitHub Actions logs" \
            -d "parse_mode=Markdown" || true
